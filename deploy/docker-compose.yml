version: '3.8'

services:
  nginx-proxy:
    image: nginx:stable-alpine
    container_name: hrl_cdn_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/streaming:/var/www/streaming:ro
      - /var/www/panel.hrl/wordpress:/var/www/wordpress:ro
    depends_on:
      - node-express-api
      - wordpress-headless
    restart: always

  wordpress-headless:
    image: wordpress:6.4-php8.2-fpm-alpine
    container_name: hrl_wp_headless
    environment:
      WORDPRESS_DB_HOST: db-mysql
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-hrl_commerce_db}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-hrl_mysql_user}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-hrl_db_strong_password_901}
    volumes:
      - ./deploy/wp-app:/var/www/html:rw
      - ./deploy/wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:rw
      - ./deploy/wp-content/uploads:/var/www/html/wp-content/uploads:rw
    depends_on:
      - db-mysql
    restart: always

  db-mysql:
    image: mysql:8.1
    container_name: hrl_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-hrl_root_db_strong_2026}
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME:-hrl_commerce_db}
      MYSQL_USER: ${WORDPRESS_DB_USER:-hrl_mysql_user}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD:-hrl_db_strong_password_901}
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  node-express-api:
    build: .
    container_name: hrl_node_rest_api
    working_dir: /app
    ports:
      - "9108:9108"
    environment:
      JWT_SECRET: ${JWT_SECRET:-hrl_core_jwt_sec_9088421}
      HMAC_SECRET: ${HMAC_SECRET:-replace-with-long-hmac-secret}
      HEADLESS_SECRET: ${HEADLESS_SECRET:-replace-with-long-random-secret}
      PORT: ${PORT:-9108}
      NODE_ENV: production
    depends_on:
      - cache-redis
    restart: always

  cache-redis:
    image: redis:7-alpine
    container_name: hrl_session_redis
    restart: always

volumes:
  db_data:
    driver: local
