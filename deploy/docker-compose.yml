version: '3.8'

services:
  nginx-proxy:
    image: nginx:stable-alpine
    container_name: hrl_cdn_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/streaming:/var/www/streaming:ro
    depends_on:
      - node-express-api
    restart: always

  node-express-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hrl_node_rest_api
    ports:
      - "9108:9108"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      HMAC_SECRET: ${HMAC_SECRET}
      HEADLESS_SECRET: ${HEADLESS_SECRET}
      APP_ORIGIN: ${APP_ORIGIN:-https://app.hrl-sync-hub.hardbanrecordslab.online}
      PORT: ${PORT:-9108}
      NODE_ENV: production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9108/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cache-redis:
    image: redis:7-alpine
    container_name: hrl_session_redis
    restart: always

volumes:
  db_data:
    driver: local
