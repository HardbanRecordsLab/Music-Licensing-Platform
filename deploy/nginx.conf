events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────
    server {
        listen 80;
        server_name hrl-sync-hub.hardbanrecordslab.online;
        return 301 https://$host$request_uri;
    }

    # ─── Backend API: https://hrl-sync-hub.hardbanrecordslab.online ──────────
    server {
        listen 443 ssl;
        server_name hrl-sync-hub.hardbanrecordslab.online;

        ssl_certificate     /etc/letsencrypt/live/hrl-sync-hub.hardbanrecordslab.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hrl-sync-hub.hardbanrecordslab.online/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # CORS jest obsługiwany po stronie Express – nginx tylko proxy-uje
        location / {
            proxy_pass         http://node-express-api:9108;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket upgrade
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Chronione pliki audio (Nginx X-Accel-Redirect)
        location /protected_audio/ {
            internal;
            alias /var/www/streaming/audio/;
            add_header Content-Type       "audio/mpeg";
            add_header Cache-Control      "no-store, no-cache, must-revalidate, private";
            add_header Pragma             "no-cache";
            expires off;
        }
    }
}
